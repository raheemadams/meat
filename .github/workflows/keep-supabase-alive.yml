name: Keep Supabase Alive

# Supabase's free tier pauses a project after 7 days with no activity.
# This workflow pings the REST API on a schedule so the database stays awake.
# It runs every 2 days, plus you can trigger it manually from the Actions tab.

on:
  schedule:
    - cron: "0 9 */2 * *" # every 2 days at 09:00 UTC
  workflow_dispatch: {}     # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY repo secrets must be set."
            exit 1
          fi

          # A lightweight read against the orders table. RLS may return no rows for
          # the anon role, but the query still executes against Postgres, which is
          # what keeps the project from auto-pausing.
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/orders?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP status: $status"

          # Any 2xx (data) or 4xx (RLS/permission) response means the DB was reached.
          # Only a 5xx or connection failure indicates the project is down/paused.
          if [ "$status" -ge 500 ] || [ "$status" -eq 000 ]; then
            echo "::error::Supabase did not respond healthily (status $status)."
            exit 1
          fi

          echo "Supabase reached successfully."
